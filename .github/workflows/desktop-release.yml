name: Desktop release

# Tag-triggered Windows-only build that produces the MSIX for Microsoft Store
# submission. Artifacts are attached to the workflow run; nothing is pushed to
# R2 — download the MSIX from the Actions tab and upload it to Partner Center.
on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'desktop/src-tauri -> target'

      - name: Install desktop npm dependencies
        working-directory: desktop
        run: npm install

      # Builds the unsigned MSI + the raw MolarPlus exe under target/release/.
      # The MSI itself isn't shipped to the Store (it was rejected for being
      # unsigned under policy 10.2.9); we keep it as a side-output for QA /
      # potential direct distribution later.
      - name: Build Tauri (Windows MSI)
        working-directory: desktop
        run: npx tauri build

      # Wrap the raw exe into an MSIX with the Partner Center identity. The
      # MSIX is intentionally unsigned — Microsoft signs it at Store submission.
      - name: Build MSIX
        shell: pwsh
        run: pwsh -File desktop/src-tauri/msix/build-msix.ps1

      - name: Locate MSIX
        id: msix
        shell: pwsh
        run: |
          $path = Get-ChildItem -Path desktop/src-tauri/target/release/bundle/msix -Filter *.msix -File -ErrorAction Stop |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $path) { throw "No MSIX found under target/release/bundle/msix" }
          "path=$path"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$(Split-Path -Leaf $path)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Found: $path"

      - name: Upload MSIX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MolarPlus-Windows-MSIX
          path: ${{ steps.msix.outputs.path }}
          retention-days: 90

      # Optional secondary artifact — useful if you ever want the unsigned MSI
      # for QA. Not shipped to the Store. Safe to delete this step if unused.
      - name: Upload MSI as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MolarPlus-Windows-MSI
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 90
          if-no-files-found: warn
