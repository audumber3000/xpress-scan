name: Build Desktop (Windows MSI)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0)'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri (MSI)
        working-directory: desktop
        run: npx tauri build --bundles msi

      - name: Locate MSI
        id: msi
        shell: bash
        run: |
          MSI_PATH=$(find desktop/src-tauri/target/release/bundle/msi -name '*.msi' | head -1)
          if [ -z "$MSI_PATH" ]; then
            echo "❌ No MSI found"; exit 1
          fi
          MSI_NAME=$(basename "$MSI_PATH")
          echo "path=$MSI_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$MSI_NAME" >> "$GITHUB_OUTPUT"
          echo "Found: $MSI_NAME"

      - name: Upload MSI as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MolarPlus-Windows-MSI
          path: ${{ steps.msi.outputs.path }}
          retention-days: 90
