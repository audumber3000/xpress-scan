name: Build Desktop (Windows MSI)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0)'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri (MSI)
        working-directory: desktop
        run: npx tauri build --bundles msi

      - name: Locate MSI
        id: msi
        shell: bash
        run: |
          MSI_PATH=$(find desktop/src-tauri/target/release/bundle/msi -name '*.msi' | head -1)
          if [ -z "$MSI_PATH" ]; then
            echo "❌ No MSI found"; exit 1
          fi
          MSI_NAME=$(basename "$MSI_PATH")
          echo "path=$MSI_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$MSI_NAME" >> "$GITHUB_OUTPUT"
          echo "Found: $MSI_NAME"

      - name: Upload MSI to Cloudflare R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          pip install awscli
          MSI_NAME="${{ steps.msi.outputs.name }}"
          R2_KEY="desktop/${MSI_NAME}"

          aws s3 cp "${{ steps.msi.outputs.path }}" \
            "s3://${R2_BUCKET}/${R2_KEY}" \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/x-msi"

          echo "### ✅ MSI uploaded to R2" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**R2 key:** \`${R2_KEY}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Public URL:** \`https://pub-376f22e59eee415286747973b95ba075.r2.dev/${R2_KEY}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload MSI as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: MolarPlus-Windows-MSI
          path: ${{ steps.msi.outputs.path }}
          retention-days: 30
